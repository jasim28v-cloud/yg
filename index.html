<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEO-GHOST V20 | OMNI-REACH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --v-cyan: #00f2ff; --v-blue: #0044ff; --bg-black: #010205; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-black); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* محرك التمرير الشبحي V20 */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.8) contrast(1.15) saturate(1.1); 
            mask-image: radial-gradient(circle, black 50%, transparent 98%);
            -webkit-mask-image: radial-gradient(circle, black 50%, transparent 98%);
            transition: 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* الطبقات الهولوغرافية المتحركة */
        .hologram-hud { position: absolute; inset: 0; pointer-events: none; z-index: 40; border: 1px solid rgba(0, 242, 255, 0.05); }
        .scanning-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--v-cyan), transparent); opacity: 0.3; z-index: 50; animation: scan 8s infinite linear; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* نصوص تكتيكية متقدمة */
        .tactical-node { position: absolute; font-family: 'Share Tech Mono'; font-size: 8px; color: var(--v-cyan); text-shadow: 0 0 10px var(--v-cyan); z-index: 60; opacity: 0.8; }
        .node-tl { top: 110px; left: 30px; letter-spacing: 1px; }
        .node-br { bottom: 150px; right: 30px; text-align: right; animation: pulse-node 2.5s infinite; }
        @keyframes pulse-node { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }

        /* شريط العمليات اليساري الزجاجي */
        .sidebar-tactical { 
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 22px; z-index: 100;
            padding: 15px 8px; background: rgba(0, 242, 255, 0.02); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .op-btn { width: 50px; height: 50px; background: rgba(0, 0, 0, 0.6); border: 1.5px solid rgba(0, 242, 255, 0.2); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .op-btn i { font-size: 19px; color: var(--v-cyan); filter: drop-shadow(0 0 5px var(--v-cyan)); }
        .op-btn span { font-size: 9px; font-family: 'Share Tech Mono'; color: var(--v-cyan); margin-top: 3px; font-weight: bold; }

        /* مركز النواة "NEO-CORE" */
        nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; height: 75px; background: rgba(0, 2, 5, 0.95); backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .neo-core { width: 75px; height: 75px; background: linear-gradient(135deg, var(--v-cyan), var(--v-blue)); border-radius: 50%; margin-top: -50px; display: flex; align-items: center; justify-content: center; border: 6px solid #000; box-shadow: 0 0 35px var(--v-cyan); cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .neo-core:hover { transform: scale(1.1) rotate(90deg); }

        /* اللوحات التكتيكية */
        #core-panel, #admin-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.98); display: none; flex-direction: column; padding: 40px 25px; border-top: 5px solid var(--v-cyan); }
        .chat-stream { flex: 1; overflow-y: auto; padding: 10px; }
        .msg-packet { background: rgba(0, 242, 255, 0.05); border-right: 3px solid var(--v-cyan); padding: 12px; margin-bottom: 12px; font-family: 'Share Tech Mono'; font-size: 13px; color: #fff; }
    </style>
</head>
<body>

    <div class="scanning-line"></div>
    
    <header class="fixed top-8 left-6 right-6 z-[600] flex justify-between items-center pointer-events-none">
        <div class="bg-black/80 p-3 border-l-4 border-cyan-500 pointer-events-auto rounded backdrop-blur-xl flex items-center gap-4">
            <i class="fas fa-microchip text-cyan-400"></i>
            <span class="font-[Orbitron] text-xs font-black tracking-[4px] text-white">NEO-GHOST // V20</span>
        </div>
        <div class="font-mono text-[9px] text-cyan-400 bg-black/60 px-4 py-1 rounded-full border border-cyan-900" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/20 hover:text-cyan-400" onclick="checkAdmin()"><i class="fas fa-id-badge text-2xl"></i></div>
        <div class="neo-core" onclick="toggleCore()"><i class="fas fa-atom text-white text-3xl"></i></div>
        <div class="cursor-pointer text-white/20 hover:text-blue-500" onclick="window.open('https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef', '_blank')"><i class="fas fa-satellite-dish text-2xl"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-2xl font-black">SYSTEM_PURGE</h2>
            <i class="fas fa-xmark text-2xl cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <div id="core-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl font-bold tracking-widest text-white">NEURAL_HUB</h2>
            <div class="flex gap-8">
                <i class="fas fa-cloud-arrow-up text-xl text-white cursor-pointer" onclick="openUpload()"></i>
                <i class="fas fa-times text-xl text-red-500 cursor-pointer" onclick="toggleCore()"></i>
            </div>
        </div>
        <div class="chat-stream" id="chat-box"></div>
        <div class="flex gap-3 mt-4 bg-white/5 p-4 rounded-2xl border border-cyan-900/30">
            <input type="text" id="msg-input" class="flex-1 bg-transparent border-none outline-none text-cyan-400 font-mono text-sm" placeholder="Input encrypted signal...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            CHAT: "https://www.effectivegatecpm.com/fd8bgr2e?key=c5bd0ed87d0ddc0c53101f52264d4b1e",
            SHARE: "https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef",
            AUDIO: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go", sources: ['local']
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        function openUpload() { widget.open(); }

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val(); 
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="hologram-hud"></div>
                    <div class="tactical-node node-tl">LINK: SECURE<br>STREAMING_NODE: ${id.substring(1,4)}<br>STATUS: 100%_STABLE</div>
                    <div class="tactical-node node-br">ALT: ${(Math.random()*5000).toFixed(0)}ft<br>COORD: ${(Math.random()*180).toFixed(4)}N</div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" preload="auto"></video>
                    <div class="sidebar-tactical">
                        <div class="op-btn" onclick="window.open('${ADS.LIKE}', '_blank'); triggerLike('${id}')"><i class="fas fa-shield-halved"></i><span>${vid.likes || 0}</span></div>
                        <div class="op-btn" onclick="window.open('${ADS.CHAT}', '_blank'); toggleCore()"><i class="fas fa-message-code"></i><span>VOX</span></div>
                        <div class="op-btn" onclick="window.open('${ADS.AUDIO}', '_blank'); toggleMute(this, '${id}')"><i class="fas fa-headset"></i></div>
                        <div class="op-btn" onclick="window.open('${ADS.SHARE}', '_blank'); navigator.share({url:window.location.href})"><i class="fas fa-drone"></i></div>
                    </div>
                `;
                container.appendChild(section);
                adminList.innerHTML += `
                    <div class="flex items-center justify-between bg-white/5 p-4 rounded-xl mb-4 border border-cyan-900/30">
                        <video class="w-16 h-16 rounded-lg object-cover" src="${vid.url}"></video>
                        <span class="font-mono text-cyan-400">DATA_NODE_${id.substring(1,6)}</span>
                        <button onclick="deleteVideo('${id}')" class="text-red-500 bg-red-500/10 p-4 rounded-full"><i class="fas fa-skull"></i></button>
                    </div>`;
            });
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) { v.play().catch(() => {}); v.style.transform = "scale(1)"; }
                    else { v.pause(); v.currentTime = 0; v.style.transform = "scale(1.1)"; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function toggleCore() { const p = document.getElementById('core-panel'); p.style.display = (p.style.display==='flex')?'none':'flex'; }
        function sendSignal() { const i = document.getElementById('msg-input'); if(i.value.trim()){ db.ref('vox_chat').push({msg: i.value, time: Date.now()}); i.value=''; } }
        db.ref('vox_chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="msg-packet">RECV_SIGNAL:: ${m.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        function deleteVideo(id) { if(confirm("Permanently destroy node data?")) db.ref('go_2go_content/' + id).remove(); }
        function checkAdmin() { if(prompt("SCAN RETINA KEY:") === MASTER_KEY) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); if(navigator.vibrate) navigator.vibrate(50); }
        function toggleMute(btn, id) { const v = document.getElementById('vid-'+id); v.muted = !v.muted; btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-headset"></i>'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    </script>
</body>
</html>
