<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHROMA-NEBULA V22 | CORE CHAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --neon-cyan: #00f2ff; 
            --neon-purple: #bd00ff;
            --bg-black: #000000;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-black); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.9) contrast(1.1); 
            mask-image: radial-gradient(circle, black 50%, transparent 98%);
            -webkit-mask-image: radial-gradient(circle, black 50%, transparent 98%);
            transition: 1.2s ease;
        }

        /* شريط العمليات اليساري */
        .sidebar-chroma { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .chroma-btn { width: 54px; height: 54px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(0, 242, 255, 0.2); }
        .chroma-btn i { font-size: 18px; color: var(--neon-cyan); }

        /* الصحن المركزي المطور */
        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; height: 75px; background: rgba(5, 5, 10, 0.9); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .nebula-core { 
            width: 75px; height: 75px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); 
            border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; 
            border: 6px solid #000; box-shadow: 0 0 30px var(--neon-purple); cursor: pointer; 
            animation: core-glow 3s infinite alternate;
        }
        @keyframes core-glow { from { box-shadow: 0 0 20px var(--neon-cyan); } to { box-shadow: 0 0 40px var(--neon-purple); } }

        /* لوحة الدردشة داخل الصحن */
        #core-panel {
            position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.96); backdrop-filter: blur(20px);
            display: none; flex-direction: column; padding: 40px 25px; border-top: 5px solid var(--neon-cyan);
            animation: slide-up 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .chat-stream { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg-packet { background: rgba(0, 242, 255, 0.05); border-right: 3px solid var(--neon-cyan); padding: 12px; border-radius: 5px; font-family: 'Share Tech Mono'; font-size: 13px; }
        .input-hub { display: flex; gap: 10px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(0,242,255,0.2); }

        #admin-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.98); display: none; flex-direction: column; padding: 40px 25px; border-top: 5px solid var(--neon-purple); }
    </style>
</head>
<body>

    <header class="fixed top-8 left-6 right-6 z-[600] flex justify-between items-center pointer-events-none">
        <div class="bg-black/80 p-3 border-l-4 border-cyan-500 pointer-events-auto rounded backdrop-blur-xl flex items-center gap-4">
            <i class="fas fa-satellite-dish text-cyan-400 animate-pulse"></i>
            <span class="font-[Orbitron] text-[10px] font-black tracking-[4px]">CHROMA_CORE // V22</span>
        </div>
        <div class="font-mono text-[9px] text-cyan-400 bg-black/60 px-4 py-1 rounded-full border border-cyan-900" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/20 hover:text-cyan-400" onclick="checkAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div class="nebula-core" onclick="toggleCore()"><i class="fas fa-comment-dots text-white text-3xl"></i></div>
        <div class="cursor-pointer text-white/20 hover:text-purple-400" onclick="navigator.share({url:window.location.href})"><i class="fas fa-share-nodes text-2xl"></i></div>
    </nav>

    <div id="core-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl font-bold">CORE_SIGNAL</h2>
            <div class="flex gap-8">
                <i class="fas fa-cloud-arrow-up text-xl text-white cursor-pointer" onclick="openUpload()"></i>
                <i class="fas fa-times text-xl text-red-500 cursor-pointer" onclick="toggleCore()"></i>
            </div>
        </div>
        <div class="chat-stream" id="chat-box"></div>
        <div class="input-hub mt-4">
            <input type="text" id="msg-input" class="flex-1 bg-transparent border-none outline-none text-cyan-400 font-mono text-sm" placeholder="Input encrypted signal...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Orbitron] text-red-500 text-xl font-black">PURGE_CONTROL</h2>
            <i class="fas fa-xmark text-2xl cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            AUDIO: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        // محرك الرفع
        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go", sources: ['local'],
            clientAllowedFormats: ["video"]
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        function openUpload() { widget.open(); }

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val(); container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <video id="vid-${id}" loop playsinline src="${vid.url}" preload="auto"></video>
                    <div class="sidebar-chroma">
                        <div class="chroma-btn" onclick="window.open('${ADS.LIKE}', '_blank'); triggerLike('${id}')"><i class="fas fa-medal"></i><span>${vid.likes || 0}</span></div>
                        <div class="chroma-btn" onclick="toggleCore()"><i class="fas fa-headset"></i><span>COMM</span></div>
                        <div class="chroma-btn" onclick="window.open('${ADS.AUDIO}', '_blank'); toggleMute(this, '${id}')"><i class="fas fa-walkie-talkie"></i></div>
                    </div>
                `;
                container.appendChild(section);
                adminList.innerHTML += `<div class="flex items-center justify-between p-4 border border-purple-900 mb-4 bg-white/5 rounded-xl"><video class="w-16 h-16 rounded object-cover" src="${vid.url}"></video><button onclick="deleteVideo('${id}')" class="text-red-500"><i class="fas fa-skull"></i></button></div>`;
            });
            initObserver();
        });

        function toggleCore() { const p = document.getElementById('core-panel'); p.style.display = (p.style.display==='flex')?'none':'flex'; }
        function sendSignal() { const i = document.getElementById('msg-input'); if(i.value.trim()){ db.ref('vox_chat').push({msg: i.value, time: Date.now()}); i.value=''; } }
        db.ref('vox_chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="msg-packet">RECV_SIGNAL:: ${m.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play().catch(() => {});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); }
        function deleteVideo(id) { if(confirm("Destroy Intel?")) db.ref('go_2go_content/' + id).remove(); }
        function checkAdmin() { if(prompt("SCAN RETINA KEY:") === MASTER_KEY) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function toggleMute(btn, id) { const v = document.getElementById('vid-'+id); v.muted = !v.muted; btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-walkie-talkie"></i>'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    </script>
</body>
</html>
