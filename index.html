<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL-STRIKE V19 | AD-INTEGRATED EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --v-cyan: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; position: relative; z-index: 10; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; }
        
        /* تأثير الثقب الأسود */
        .v-seg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, #000 0%, transparent 15%, transparent 85%, #000 100%);
            z-index: 10;
            pointer-events: none;
        }
        
        video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.9) contrast(1.1); 
            z-index: 5;
        }

        .scan-laser { position: fixed; inset: 0; height: 2px; background: rgba(0, 242, 255, 0.2); box-shadow: 0 0 15px var(--v-cyan); z-index: 30; animation: scan 6s infinite linear; pointer-events: none; }
        @keyframes scan { 0% { top: -5%; } 100% { top: 105%; } }

        .neural-text { position: absolute; font-family: 'Share Tech Mono'; font-size: 8px; color: var(--v-cyan); text-shadow: 0 0 8px var(--v-cyan); z-index: 40; opacity: 0.8; pointer-events: none; }
        .nt-tl { top: 110px; left: 25px; line-height: 1.5; }
        .nt-br { bottom: 140px; right: 25px; text-align: right; }

        .sidebar-ops { position: absolute; left: 18px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .op-btn { width: 54px; height: 54px; background: rgba(0, 242, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; }
        .op-btn i { font-size: 20px; color: var(--v-cyan); filter: drop-shadow(0 0 5px var(--v-cyan)); }
        .op-btn span { font-size: 9px; font-family: 'Share Tech Mono'; color: var(--v-cyan); margin-top: 3px; font-weight: bold; }

        header { position: fixed; top: 30px; left: 20px; right: 20px; z-index: 500; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .brand-box { background: rgba(0,0,0,0.6); padding: 10px 18px; border-right: 4px solid var(--v-cyan); backdrop-blur: 10px; pointer-events: auto; border-radius: 5px; }

        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 410px; height: 75px; background: rgba(0, 5, 12, 0.8); backdrop-filter: blur(30px); border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .plasma-core { width: 75px; height: 75px; background: linear-gradient(135deg, var(--v-cyan), #0044ff); border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; border: 5px solid #000; box-shadow: 0 0 30px var(--v-cyan); cursor: pointer; }

        #core-panel, #admin-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.98); display: none; flex-direction: column; padding: 40px 25px; border-top: 5px solid var(--v-cyan); overflow-y: auto; }
    </style>
</head>
<body>

    <div class="scan-laser"></div>
    
    <header>
        <div class="brand-box flex items-center gap-3">
            <i class="fas fa-brain text-cyan-400"></i>
            <span class="font-[Orbitron] text-[11px] font-black tracking-[3px]">NEURAL_V19_PRO</span>
        </div>
        <div class="font-mono text-[10px] text-cyan-400 bg-black/60 px-4 py-2 rounded-full border border-cyan-900" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/20 hover:text-cyan-400" onclick="checkAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div class="plasma-core" onclick="toggleCore()"><i class="fas fa-biohazard text-white text-2xl"></i></div>
        <div class="cursor-pointer text-white/20 hover:text-blue-500" onclick="window.open('https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef', '_blank'); navigator.share({url:window.location.href})">
            <i class="fas fa-share-nodes text-2xl"></i>
        </div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-xl font-bold tracking-widest uppercase">System_Purge</h2>
            <i class="fas fa-xmark text-3xl opacity-20 cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="space-y-4"></div>
    </div>

    <div id="core-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl font-bold tracking-widest uppercase">Neural_Hub</h2>
            <div class="flex gap-10">
                <i class="fas fa-cloud-arrow-up text-2xl text-white cursor-pointer" onclick="openUpload()"></i>
                <i class="fas fa-times text-2xl text-red-500 cursor-pointer" onclick="toggleCore()"></i>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto" id="chat-box"></div>
        <div class="flex gap-3 mt-4 bg-white/5 p-4 rounded-2xl border border-cyan-900/30">
            <input type="text" id="msg-input" class="flex-1 bg-transparent outline-none text-cyan-400 font-mono text-sm" placeholder="Transmitting signal...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </div>

    <script>
        // روابط الإعلانات
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            CHAT: "https://www.effectivegatecpm.com/fd8bgr2e?key=c5bd0ed87d0ddc0c53101f52264d4b1e",
            SHARE: "https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef",
            AUDIO: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp"
        };

        const MASTER_KEY = "1234";
        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go", 
            sources: ['local'],
            multiple: false, clientAllowedFormats: ["video"]
        }, (err, res) => {
            if (!err && res.event === "success") db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
        });
        function openUpload() { widget.open(); }

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val(); 
            if(!data) return;
            
            container.innerHTML = ''; adminList.innerHTML = '';
            const fragment = document.createDocumentFragment();
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <video id="vid-${id}" loop playsinline muted data-src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="neural-text nt-tl">STATUS: LINK_ESTABLISHED<br>DECRYPTING... [OK]<br>SIGNAL_STRENGTH: MAX</div>
                    <div class="neural-text nt-br">COORD: ${(Math.random()*90).toFixed(4)}<br>NODE_ID: ${id.substring(1,7)}</div>
                    <div class="sidebar-ops">
                        <div class="op-btn" onclick="window.open(ADS.LIKE, '_blank'); triggerLike('${id}')">
                            <i class="fas fa-medal text-cyan-400"></i>
                            <span class="text-white">${vid.likes || 0}</span>
                        </div>
                        <div class="op-btn" onclick="window.open(ADS.CHAT, '_blank'); toggleCore()">
                            <i class="fas fa-helmet-safety"></i>
                            <span>HUB</span>
                        </div>
                        <div class="op-btn" onclick="window.open(ADS.AUDIO, '_blank'); toggleMute(this, '${id}')">
                            <i class="fas fa-walkie-talkie"></i>
                        </div>
                    </div>`;
                fragment.appendChild(section);

                adminList.innerHTML += `<div class="bg-white/5 p-4 rounded-xl flex items-center justify-between border border-cyan-900/30">
                    <img class="w-12 h-12 rounded object-cover" src="${vid.url.replace('.mp4', '.jpg')}">
                    <button onclick="deleteVideo('${id}')" class="text-red-500 p-2"><i class="fas fa-trash-alt"></i></button></div>`;
            });
            container.appendChild(fragment);
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) { 
                        if(!v.src) v.src = v.dataset.src;
                        e.target.classList.add('active');
                        v.play().catch(() => {}); 
                    } else { e.target.classList.remove('active'); v.pause(); }
                });
            }, { threshold: 0.65 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function checkAdmin() { if(prompt("SCAN RETINA KEY:") === MASTER_KEY) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function toggleCore() { const p = document.getElementById('core-panel'); p.style.display = (p.style.display==='flex')?'none':'flex'; }
        function deleteVideo(id) { if(confirm("Destroy Node?")) db.ref('go_2go_content/' + id).remove(); }
        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); }
        function toggleMute(btn, id) { const v = document.getElementById('vid-'+id); v.muted = !v.muted; btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-walkie-talkie"></i>'; }
        function sendSignal() { const i = document.getElementById('msg-input'); if(i.value.trim()){ db.ref('vox_chat').push({msg: i.value, time: Date.now()}); i.value=''; } }
        
        db.ref('vox_chat').limitToLast(20).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="p-3 mb-2 border-r-2 border-cyan-400 bg-cyan-400/5 text-xs text-white">SIGNAL:: ${m.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        document.addEventListener('touchstart', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
