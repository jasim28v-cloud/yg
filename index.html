<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL-STRIKE V19 | THE APEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --v-cyan: #00f2ff; --v-red: #ff003c; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* محرك التمرير الشبحي المطور */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.8) contrast(1.2); 
            mask-image: radial-gradient(circle, black 50%, transparent 95%);
            -webkit-mask-image: radial-gradient(circle, black 50%, transparent 95%);
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* ليزر المسح الهولوغرافي */
        .scan-laser { position: absolute; width: 100%; height: 2px; background: rgba(0, 242, 255, 0.3); box-shadow: 0 0 15px var(--v-cyan); z-index: 30; animation: scan 6s infinite linear; }
        @keyframes scan { 0% { top: -5%; } 100% { top: 105%; } }

        /* النصوص الأيونية المتطورة */
        .neural-text { position: absolute; font-family: 'Share Tech Mono'; font-size: 8px; color: var(--v-cyan); text-shadow: 0 0 8px var(--v-cyan); z-index: 40; opacity: 0.8; pointer-events: none; }
        .nt-tl { top: 100px; left: 25px; line-height: 1.5; }
        .nt-br { bottom: 140px; right: 25px; text-align: right; }

        /* أزرار العمليات الموحدة - اليسار الموسط */
        .sidebar-ops { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .op-btn { width: 54px; height: 54px; background: rgba(0, 242, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; }
        .op-btn i { font-size: 20px; color: var(--v-cyan); filter: drop-shadow(0 0 5px var(--v-cyan)); }
        .op-btn span { font-size: 9px; font-family: 'Share Tech Mono'; color: var(--v-cyan); margin-top: 3px; font-weight: bold; }

        /* الصحن المركزي النبضي */
        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 88%; max-width: 410px; height: 75px; background: rgba(0, 5, 12, 0.9); backdrop-filter: blur(40px); border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .plasma-core { width: 75px; height: 75px; background: linear-gradient(135deg, var(--v-cyan), #0044ff); border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; border: 5px solid #000; box-shadow: 0 0 30px var(--v-cyan); cursor: pointer; animation: pulse-core 2s infinite ease-in-out; }
        @keyframes pulse-core { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* اللوحات */
        #core-panel, #admin-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.98); display: none; flex-direction: column; padding: 40px 25px; border-top: 5px solid var(--v-cyan); }
        .admin-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(0,242,255,0.1); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="scan-laser"></div>
    
    <header class="fixed top-8 left-6 right-6 z-[600] flex justify-between items-center pointer-events-none">
        <div class="bg-black/80 p-3 border-r-4 border-cyan-500 pointer-events-auto rounded flex items-center gap-3 backdrop-blur-xl">
            <i class="fas fa-brain text-cyan-400"></i>
            <span class="font-[Orbitron] text-[10px] font-black tracking-[4px]">NEURAL_V19_PRO</span>
        </div>
        <div class="font-mono text-[9px] text-cyan-400 bg-black/60 px-4 py-1 rounded-full border border-cyan-900" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/20 hover:text-cyan-400" onclick="checkAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div class="plasma-core" onclick="toggleCore()"><i class="fas fa-atom text-white text-2xl"></i></div>
        <div class="cursor-pointer text-white/20 hover:text-blue-500" onclick="window.open('https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef', '_blank')"><i class="fas fa-share-nodes text-2xl"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-xl font-bold tracking-widest">PURGE_SYSTEM</h2>
            <i class="fas fa-xmark text-2xl cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <div id="core-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl font-bold tracking-widest text-white">NEURAL_HUB</h2>
            <div class="flex gap-8">
                <i class="fas fa-cloud-arrow-up text-xl text-white cursor-pointer" onclick="openUpload()"></i>
                <i class="fas fa-times text-xl text-red-500 cursor-pointer" onclick="toggleCore()"></i>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto" id="chat-box"></div>
        <div class="flex gap-3 mt-4 bg-white/5 p-4 rounded-2xl border border-cyan-900/30">
            <input type="text" id="msg-input" class="flex-1 bg-transparent border-none outline-none text-cyan-400 font-mono text-sm" placeholder="Input neural signal...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            CHAT: "https://www.effectivegatecpm.com/fd8bgr2e?key=c5bd0ed87d0ddc0c53101f52264d4b1e",
            SHARE: "https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef",
            AUDIO: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go", sources: ['local']
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        function openUpload() { widget.open(); }

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val(); 
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="neural-text nt-tl">STATUS: LINK_ESTABLISHED<br>DECRYPTING... [OK]<br>AI_SENSE: ACTIVE</div>
                    <div class="neural-text nt-br">COORD_N: ${(Math.random()*100).toFixed(4)}<br>NODE_ADDR: ${id.substring(1,5)}</div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" preload="auto"></video>
                    <div class="sidebar-ops">
                        <div class="op-btn" onclick="window.open('${ADS.LIKE}', '_blank'); triggerLike('${id}')"><i class="fas fa-medal"></i><span>${vid.likes || 0}</span></div>
                        <div class="op-btn" onclick="window.open('${ADS.CHAT}', '_blank'); toggleCore()"><i class="fas fa-helmet-safety"></i><span>SQUAD</span></div>
                        <div class="op-btn" onclick="window.open('${ADS.AUDIO}', '_blank'); toggleMute(this, '${id}')"><i class="fas fa-walkie-talkie"></i></div>
                        <div class="op-btn" onclick="window.open('${ADS.SHARE}', '_blank'); navigator.share({url:window.location.href})"><i class="fas fa-satellite"></i></div>
                    </div>
                `;
                container.appendChild(section);
                adminList.innerHTML += `
                    <div class="admin-item">
                        <video class="w-16 h-16 rounded-xl object-cover" src="${vid.url}"></video>
                        <span class="font-mono text-cyan-400">NODE_${id.substring(1,6)}</span>
                        <button onclick="deleteVideo('${id}')" class="text-red-500 bg-red-500/10 p-4 rounded-full"><i class="fas fa-skull"></i></button>
                    </div>`;
            });
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) { v.play().catch(() => {}); v.style.transform = "scale(1)"; }
                    else { v.pause(); v.currentTime = 0; v.style.transform = "scale(1.1)"; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function toggleCore() { const p = document.getElementById('core-panel'); p.style.display = (p.style.display==='flex')?'none':'flex'; }
        function sendSignal() { const i = document.getElementById('msg-input'); if(i.value.trim()){ db.ref('vox_chat').push({msg: i.value, time: Date.now()}); i.value=''; } }
        db.ref('vox_chat').limitToLast(20).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="p-3 mb-2 border-r-4 border-cyan-400 bg-cyan-400/10 font-mono text-xs text-white">SIGNAL:: ${m.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        function deleteVideo(id) { if(confirm("Permanently destroy node?")) db.ref('go_2go_content/' + id).remove(); }
        function checkAdmin() { if(prompt("SCAN RETINA KEY:") === MASTER_KEY) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); if(navigator.vibrate) navigator.vibrate(30); }
        function toggleMute(btn, id) { const v = document.getElementById('vid-'+id); v.muted = !v.muted; btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-walkie-talkie"></i>'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    </script>
</body>
</html>
