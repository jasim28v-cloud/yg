<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEO-GLASS V21.5 | THE FINAL ASSET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --v-cyan: #00f2ff; --v-purple: #bd00ff; --bg-glass: rgba(0, 0, 0, 0.3); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* محرك التصفح الشفاف */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.9) contrast(1.15); 
            mask-image: radial-gradient(circle, black 60%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle, black 60%, transparent 100%);
            transition: 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* الرادار الأيوني (بوابة الدردشة) */
        .radar-chat-gate {
            position: absolute; bottom: 130px; left: 25px; width: 85px; height: 85px;
            border: 1px solid var(--v-cyan); border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 100%);
            z-index: 100; cursor: pointer; backdrop-filter: blur(5px);
        }
        .radar-sweep {
            position: absolute; top: 50%; left: 50%; width: 100%; height: 2px;
            background: var(--v-cyan); transform-origin: left;
            animation: rotate-radar 3s linear infinite; box-shadow: 0 0 10px var(--v-cyan);
        }
        @keyframes rotate-radar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* الأزرار الزجاجية اليسارية */
        .sidebar-glass { 
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 18px; z-index: 100;
        }
        .glass-btn { 
            width: 52px; height: 52px; background: var(--bg-glass); 
            backdrop-filter: blur(15px); border-radius: 12px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; transition: 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-btn i { font-size: 18px; color: var(--v-cyan); filter: drop-shadow(0 0 5px var(--v-cyan)); }
        .glass-btn span { font-size: 8px; font-family: 'Share Tech Mono'; color: #fff; margin-top: 2px; }

        /* الصحن المركزي الشفاف */
        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 410px; height: 70px; 
            background: var(--bg-glass); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 500; 
        }
        .core-nebula { 
            width: 70px; height: 70px; 
            background: linear-gradient(135deg, var(--v-cyan), var(--v-purple)); 
            border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; 
            border: 4px solid #000; box-shadow: 0 0 25px var(--v-cyan); cursor: pointer; 
        }

        /* لوحة الدردشة الرادارية */
        #radar-panel {
            position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(20px);
            display: none; flex-direction: column; padding: 40px 25px; border-top: 4px solid var(--v-cyan);
        }
        .msg-line { background: rgba(0, 242, 255, 0.05); border-right: 3px solid var(--v-cyan); padding: 12px; margin-bottom: 10px; font-family: 'Share Tech Mono'; font-size: 13px; }
    </style>
</head>
<body>

    <header class="fixed top-8 left-6 right-6 z-[600] flex justify-between items-center pointer-events-none">
        <div class="bg-black/40 p-3 border-l-4 border-cyan-400 pointer-events-auto rounded backdrop-blur-md flex items-center gap-4">
            <i class="fas fa-eye text-cyan-400"></i>
            <span class="font-[Orbitron] text-[10px] font-black tracking-[4px]">NEO_GLASS_V21.5</span>
        </div>
        <div class="font-mono text-[9px] text-cyan-400" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <div class="radar-chat-gate" onclick="toggleRadarChat()">
        <div class="radar-sweep"></div>
    </div>

    <nav>
        <div class="cursor-pointer text-white/20" onclick="checkAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div class="core-nebula" id="upload-btn"><i class="fas fa-bolt text-white text-3xl"></i></div>
        <div class="cursor-pointer text-white/20" onclick="navigator.share({url:window.location.href})"><i class="fas fa-share-nodes text-2xl"></i></div>
    </nav>

    <div id="radar-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl font-bold">RADAR_COMMS</h2>
            <i class="fas fa-xmark text-2xl cursor-pointer text-red-500" onclick="toggleRadarChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto"></div>
        <div class="flex gap-2 mt-4 bg-white/5 p-3 rounded-xl border border-cyan-900/30">
            <input type="text" id="msg-input" class="flex-1 bg-transparent border-none outline-none text-cyan-400 font-mono text-sm" placeholder="Send signal...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            CHAT: "https://www.effectivegatecpm.com/fd8bgr2e?key=c5bd0ed87d0ddc0c53101f52264d4b1e",
            AUDIO: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp"
        };

        firebase.initializeApp({ databaseURL: "https://goks-e0cba-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dhdg9gu88", uploadPreset: "go_2go", sources: ['local']
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('go_2go_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("upload-btn").onclick = () => widget.open();

        db.ref('go_2go_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const data = snap.val(); container.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <video id="vid-${id}" loop playsinline src="${vid.url}" preload="auto"></video>
                    <div class="sidebar-glass">
                        <div class="glass-btn" onclick="window.open('${ADS.LIKE}', '_blank'); triggerLike('${id}')"><i class="fas fa-medal"></i><span>${vid.likes || 0}</span></div>
                        <div class="glass-btn" onclick="toggleRadarChat()"><i class="fas fa-headset"></i><span>COMM</span></div>
                        <div class="glass-btn" onclick="window.open('${ADS.AUDIO}', '_blank'); toggleMute(this, '${id}')"><i class="fas fa-walkie-talkie"></i></div>
                    </div>
                `;
                container.appendChild(section);
            });
            initObserver();
        });

        function toggleRadarChat() { const p = document.getElementById('radar-panel'); p.style.display = (p.style.display==='flex')?'none':'flex'; }
        function sendSignal() { const i = document.getElementById('msg-input'); if(i.value.trim()){ db.ref('vox_chat').push({msg: i.value, time: Date.now()}); i.value=''; } }
        db.ref('vox_chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="msg-line">RADAR_SYNC:: ${m.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play().catch(() => {});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function triggerLike(id) { db.ref('go_2go_content/' + id + '/likes').transaction(l => (l || 0) + 1); }
        function checkAdmin() { if(prompt("SCAN ID:") === MASTER_KEY) alert("ADMIN_ACCESS_STABLISHED"); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    </script>
</body>
</html>
